<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nexus Gaming - Enlazar Sedes</title>
    <style>
    :root {
        --nexus-dark: #0b0c10;
        --nexus-card: #1f2833;
        --nexus-purple: #8a2be2;
        --nexus-cyan: #00f0ff;
        --nexus-text: #c5c6c7;
        --nexus-white: #ffffff;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, sans-serif; }
    body { background: var(--nexus-dark); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:40px; color: var(--nexus-text); }
    
    .container { width:100%; max-width:1300px; display:flex; flex-direction:column; gap:20px; }
    
    .grid-layout { display: grid; grid-template-columns: 1fr 1.3fr; gap: 30px; align-items: start; }
    
    .card { width:100%; background: var(--nexus-card); border-radius:18px; overflow:hidden; box-shadow:0 0 20px rgba(0,0,0,.5); border: 1px solid #45a29e; }
    
    .header { background: linear-gradient(90deg, var(--nexus-purple), var(--nexus-cyan)); color: white; padding:25px 30px; }
    .header h1 { font-size:24px; margin-bottom:6px; }
    .header p { opacity: 0.9; font-size: 14px; }
    
    form { padding:30px; display:flex; flex-direction:column; }
    label { margin-bottom:8px; color: var(--nexus-white); font-weight:600; font-size: 14px; }
    select, input { padding:12px; background: #0b0c10; color: white; border:1px solid #45a29e; border-radius:10px; margin-bottom:20px; font-size:15px; outline:none; width: 100%; }
    select:focus, input:focus { border-color: var(--nexus-cyan); box-shadow:0 0 10px rgba(0,240,255,0.4); }
    input[readonly] { background: #161920; color: var(--nexus-cyan); font-weight: bold; cursor: not-allowed; }
    
    button[type="submit"] { background: transparent; color: var(--nexus-white); border: 2px solid var(--nexus-purple); padding:14px; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; transition:.3s; }
    button[type="submit"]:hover { background: var(--nexus-purple); box-shadow: 0 0 15px var(--nexus-purple); }

    .btn-mostrar {
        display: block; text-align: center;
        background: transparent; color: var(--nexus-cyan);
        border: 2px solid var(--nexus-cyan);
        padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; text-decoration: none;
        transition: .3s; margin-top: 12px;
    }
    .btn-mostrar:hover { background: var(--nexus-cyan); color: #000; box-shadow: 0 0 15px var(--nexus-cyan); }
    
    .info-calculo { font-size: 13px; color: var(--nexus-cyan); margin-top: -15px; margin-bottom: 20px; font-style: italic; }
    
    /* Alertas Toasts con animación de salida */
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1100; display: flex; flex-direction: column; gap: 10px; }
    .alerta { padding: 16px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: opacity 0.5s ease, transform 0.5s ease; }
    .alerta.fade-out { opacity: 0; transform: translateY(-20px); }
    .alerta-error { background: #2a0000; color: #ff5555; border: 1px solid #ff5555; }
    .alerta-exito { background: #002a2a; color: var(--nexus-cyan); border: 1px solid var(--nexus-cyan); }

    /* Tabla */
    .tabla-seccion { padding: 30px; background: var(--nexus-card); }
    .tabla-seccion h2 { color: var(--nexus-white); margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #0b0c10; color: var(--nexus-cyan); padding: 14px; font-size: 13px; border-bottom: 2px solid var(--nexus-purple); text-transform: uppercase; }
    td { padding: 14px; border-bottom: 1px solid #45a29e; color: var(--nexus-text); vertical-align: middle; }
    tr:hover td { background-color: #0b0c10; }
    
    .badge-distancia { background: rgba(0, 240, 255, 0.1); color: var(--nexus-cyan); border: 1px solid var(--nexus-cyan); padding: 4px 10px; border-radius: 20px; display: inline-block; }

    /* Botones Acción */
    .btn-accion { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; }
    .btn-editar { background: #331a4d; color: var(--nexus-purple); border: 1px solid var(--nexus-purple); }
    .btn-eliminar { background: #4d1a1a; color: #ff5555; border: 1px solid #ff5555; }

    /* Modales Estructurados con Scroll */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.75); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
    .modal-overlay.active { display: flex; }
    
    .modal-card { 
        background: var(--nexus-card); 
        border-radius: 18px; 
        width: 100%; 
        max-width: 550px; 
        max-height: 85vh; 
        border: 1px solid var(--nexus-purple); 
        box-shadow: 0 0 30px rgba(138, 43, 226, 0.4);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        animation: animarModal 0.3s ease;
    }
    
    @keyframes animarModal {
        from { transform: translateY(-20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }
    
    .modal-header { background: var(--nexus-purple); color: white; padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .modal-header h2 { font-size: 20px; }
    
    .modal-body { padding: 25px; overflow-y: auto; flex-grow: 1; }
    .modal-body form { padding: 0; }
    
    .btn-close { background: none; border: none; color: white; font-size: 28px; cursor: pointer; line-height: 1; opacity: 0.7; transition: 0.2s; }
    .btn-close:hover { opacity: 1; color: var(--nexus-cyan); }
    
    /* Diseño global de botones del modal */
    .modal-btn-group { display: flex; gap: 12px; justify-content: flex-end; margin-top: 10px; }
    .btn-modal-cancelar, .btn-modal-guardar { padding: 12px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: 0.3s; }
    
    .btn-modal-cancelar { background: #331e24; color: #ff5555; border: 1px solid #ff5555; }
    .btn-modal-cancelar:hover { background: #4d1a1a; box-shadow: 0 0 12px rgba(255, 85, 85, 0.4); }
    
    .btn-modal-guardar { background: var(--nexus-cyan); color: #0b0c10; }
    .btn-modal-guardar:hover { background: #00d4e2; box-shadow: 0 0 15px var(--nexus-cyan); }

    @media (max-width: 992px) { .grid-layout { grid-template-columns: 1fr; } }
</style>
    
</head>
<body>

<!-- Contenedor flotante de Toasts -->
<div class="toast-container">
    <div th:if="${mensajeError}" class="alerta alerta-error">
        <span th:text="${mensajeError}"></span>
    </div>
    <div th:if="${mensajeExito}" class="alerta alerta-exito">
        <span th:text="${mensajeExito}"></span>
    </div>
</div>

<div class="container">
    <div class="grid-layout">
        
        <!-- Formulario de Creación (Izquierda) -->
        <div class="card">
            <div class="header">
                <h1>Conectar Sedes</h1>
                <p>Selecciona dos ciudades para calcular la ruta.</p>
            </div>

            <form th:action="@{/tramos/guardar}" th:object="${nuevoTramo}" method="post">
                <label>Sede de Origen</label>
                <select th:field="*{sedeOrigen}" id="origen" onchange="calcularDistancia()" required>
                    <option value="">Selecciona el origen...</option>
                    <option th:each="sede : ${listaSedes}" 
                            th:value="${sede.idSede}" 
                            th:text="${sede.nombreCiudad}"
                            th:data-lat="${sede.latitud}"
                            th:data-lng="${sede.longitud}"></option>
                </select>

                <label>Sede de Destino</label>
                <select th:field="*{sedeDestino}" id="destino" onchange="calcularDistancia()" required>
                    <option value="">Selecciona el destino...</option>
                    <option th:each="sede : ${listaSedes}" 
                            th:value="${sede.idSede}" 
                            th:text="${sede.nombreCiudad}"
                            th:data-lat="${sede.latitud}"
                            th:data-lng="${sede.longitud}"></option>
                </select>

                <label>Distancia Calculada (Km)</label>
                <input type="number" step="any" th:field="*{distanciaKm}" id="distancia" readonly required placeholder="Calculando automáticamente...">
                <div class="info-calculo" id="estado-calculo">Esperando selección de ciudades...</div>

                <button type="submit">Guardar Ruta en el Sistema</button>
                
                <a href="/tramos/mapa" class="btn-mostrar">Mostrar Mapa de Red</a>
            </form>
        </div>

        <!-- Historial en Tabla (Derecha) -->
        <div class="card">
            <div class="tabla-seccion">
                <h2>Tramos Conectados</h2>
                <div class="tabla-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Origen</th>
                                <th>Destino</th>
                                <th>Métricas</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(listaTramos)}">
                                <td colspan="5" style="text-align: center; color: #9ca3af; font-style: italic; padding: 30px 0;">
                                    No hay tramos guardados en el sistema actualmente.
                                </td>
                            </tr>
                            <tr th:each="tramo : ${listaTramos}">
                                <td th:text="${tramo.idTramo}" style="font-weight: 600; color: #6b7280;"></td>
                                <td th:text="${tramo.sedeOrigen.nombreCiudad}"></td>
                                <td th:text="${tramo.sedeDestino.nombreCiudad}"></td>
                                
                                <!-- CORRECCIÓN: El <td> ya no tiene flexbox, el contenido está dentro de un <div> -->
                                <td>
                                    <div style="display: flex; flex-direction: column; gap: 4px; align-items: flex-start;">
                                        <span class="badge-distancia" th:text="${tramo.distanciaKm} + ' Km'"></span>
                                        <span style="color: var(--nexus-purple); font-size: 11px; font-weight: bold;" 
                                              th:text="'Aprox. ' + ${#numbers.formatDecimal(tramo.distanciaKm / 60.0, 1, 1)} + ' hrs'">
                                        </span>
                                    </div>
                                </td>
                                
                                <td>
                                    <div style="display: flex; gap: 6px;">
                                        <button type="button" class="btn-accion btn-editar" th:onclick="'abrirModalEditar(' + ${tramo.idTramo} + ')'">
                                            Editar
                                        </button>
                                        <a th:href="@{/tramos/eliminar/{id}(id=${tramo.idTramo})}" 
                                           class="btn-accion btn-eliminar"
                                           onclick="return confirm('¿Estás seguro de que deseas eliminar este tramo de conexión?');">
                                            Eliminar
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div> 
</div>

<!-- ==================== CONTENEDOR DEL MODAL "EL CUADRADO" CORREGIDO ==================== -->
<div id="modalEditar" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">
            <h2>Editar Conexión</h2>
            <button type="button" class="btn-close" onclick="cerrarModal()">&times;</button>
        </div>
        <div class="modal-body" id="modalBodyContainer">
            <!-- Cargando dinámicamente... -->
        </div>
    </div>
</div>

<script>
    // --- TEMPORIZADOR DE TOASTS (2 SEGUNDOS) ---
    document.addEventListener("DOMContentLoaded", function() {
        const alertas = document.querySelectorAll('.alerta');
        alertas.forEach(function(alerta) {
            setTimeout(function() {
                alerta.classList.add('fade-out');
                setTimeout(function() {
                    alerta.remove();
                }, 500);
            }, 2000);
        });
    });

    // --- Lógica del Modal con Fragmento de Thymeleaf ---
    function abrirModalEditar(id) {
        const modal = document.getElementById('modalEditar');
        const modalBody = document.getElementById('modalBodyContainer');
        
        modalBody.innerHTML = "<p style='text-align: center; color: #6b7280;'>Cargando formulario de edición...</p>";
        modal.classList.add('active');
        
        fetch(`/tramos/editar/${id}`)
            .then(response => {
                if(!response.ok) throw new Error("No se pudo obtener el fragmento");
                return response.text();
            })
            .then(htmlFragment => {
                modalBody.innerHTML = htmlFragment;
                calcularDistanciaEdit();
            })
            .catch(error => {
                modalBody.innerHTML = "<p style='color:#ff5555; text-align:center;'>Error al cargar el fragmento de edición.</p>";
                console.error(error);
            });
    }

    function cerrarModal() {
        document.getElementById('modalEditar').classList.remove('active');
    }

    window.onclick = function(event) {
        const modal = document.getElementById('modalEditar');
        if (event.target === modal) {
            cerrarModal();
        }
    }

    // --- Cálculo OSRM para Creación (Con Horas) ---
    function calcularDistancia() {
        const selectOrigen = document.getElementById('origen');
        const selectDestino = document.getElementById('destino');
        const inputDistancia = document.getElementById('distancia');
        const estadoCalculo = document.getElementById('estado-calculo');

        if (selectOrigen.value && selectDestino.value) {
            if (selectOrigen.value === selectDestino.value) {
                estadoCalculo.innerText = "Error: El origen y el destino no pueden ser la misma ciudad.";
                estadoCalculo.style.color = "#ff5555";
                inputDistancia.value = "";
                return;
            }

            estadoCalculo.innerText = "Calculando ruta por carretera...";
            estadoCalculo.style.color = "var(--nexus-cyan)";

            const optionOrigen = selectOrigen.options[selectOrigen.selectedIndex];
            const optionDestino = selectDestino.options[selectDestino.selectedIndex];

            const latOrigen = optionOrigen.getAttribute("data-lat");
            const lngOrigen = optionOrigen.getAttribute("data-lng");
            const latDestino = optionDestino.getAttribute("data-lat");
            const lngDestino = optionDestino.getAttribute("data-lng");

            const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${lngOrigen},${latOrigen};${lngDestino},${latDestino}?overview=false`;

            fetch(osrmUrl)
                .then(response => response.json())
                .then(data => {
                    if (data.code === 'Ok' && data.routes.length > 0) {
                        const ruta = data.routes[0];
                        const distanciaKm = (ruta.distance / 1000).toFixed(2);
                        const horasEstimadas = (distanciaKm / 60.0).toFixed(1);
                        
                        inputDistancia.value = distanciaKm;
                        estadoCalculo.innerHTML = `Ruta calculada: <b>${distanciaKm} km</b> (Aprox. ${horasEstimadas} hrs)`;
                        estadoCalculo.style.color = "var(--nexus-cyan)"; 
                    } else {
                        estadoCalculo.innerText = "No se pudo trazar una ruta por carretera.";
                        estadoCalculo.style.color = "#ff5555";
                        inputDistancia.value = "";
                    }
                })
                .catch(error => {
                    estadoCalculo.innerText = "Error de conexión con OSRM.";
                    estadoCalculo.style.color = "#ff5555";
                });
        }
    }

    // --- Cálculo OSRM dentro del Modal (Con Horas) ---
    function calcularDistanciaEdit() {
        const selectOrigen = document.getElementById('editOrigen');
        const selectDestino = document.getElementById('editDestino');
        const inputDistancia = document.getElementById('editDistancia');
        const estadoCalculo = document.getElementById('edit-estado-calculo');

        if (selectOrigen && selectDestino && selectOrigen.value && selectDestino.value) {
            if (selectOrigen.value === selectDestino.value) {
                estadoCalculo.innerText = "Error: El origen y el destino no pueden ser la misma ciudad.";
                estadoCalculo.style.color = "#ff5555";
                inputDistancia.value = "";
                return;
            }

            estadoCalculo.innerText = "Recalculando ruta...";
            estadoCalculo.style.color = "var(--nexus-cyan)";

            const optionOrigen = selectOrigen.options[selectOrigen.selectedIndex];
            const optionDestino = selectDestino.options[selectDestino.selectedIndex];

            const latOrigen = optionOrigen.getAttribute("data-lat");
            const lngOrigen = optionOrigen.getAttribute("data-lng");
            const latDestino = optionDestino.getAttribute("data-lat");
            const lngDestino = optionDestino.getAttribute("data-lng");

            const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${lngOrigen},${latOrigen};${lngDestino},${latDestino}?overview=false`;

            fetch(osrmUrl)
                .then(response => response.json())
                .then(data => {
                    if (data.code === 'Ok' && data.routes.length > 0) {
                        const ruta = data.routes[0];
                        const distanciaKm = (ruta.distance / 1000).toFixed(2);
                        const horasEstimadas = (distanciaKm / 60.0).toFixed(1);
                        
                        inputDistancia.value = distanciaKm;
                        estadoCalculo.innerHTML = `Ruta recalculada: <b>${distanciaKm} km</b> (Aprox. ${horasEstimadas} hrs)`;
                        estadoCalculo.style.color = "var(--nexus-cyan)"; 
                    } else {
                        estadoCalculo.innerText = "Error al trazar ruta.";
                        estadoCalculo.style.color = "#ff5555";
                    }
                })
                .catch(error => {
                    estadoCalculo.innerText = "Error con servidor OSRM.";
                    estadoCalculo.style.color = "#ff5555";
                });
        }
    }
</script>
</body>
</html>
