<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Gaming - Catálogo Oficial</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            nexusDark: '#0B0C10',
            nexusCard: '#1A1A24',
            nexusPurple: '#BC13FE',
            nexusCyan: '#00F0FF',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-nexusDark text-gray-100 font-sans min-h-screen">

  <!-- NAV BAR -->
  <header class="border-b border-nexusPurple/30 bg-nexusDark/90 backdrop-blur sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-nexusCyan to-nexusPurple drop-shadow-[0_0_10px_rgba(0,240,255,0.5)]">
          NEXUS
        </span>
        <span class="text-xs font-bold uppercase text-nexusPurple tracking-widest px-2 py-0.5 border border-nexusPurple rounded">
          CATÁLOGO
        </span>
      </div>

      <!-- Info del Usuario Logueado y Carrito -->
      <div class="flex items-center gap-6">
        <span id="userGreeting" class="text-sm font-semibold text-nexusCyan">Cargando piloto...</span>
        <button class="relative p-1">
          <span class="text-xl">🛒</span>
          <span id="cartCount" class="absolute -top-1 -right-1 bg-nexusPurple text-[10px] text-white font-bold px-1.5 py-0.5 rounded-full">0</span>
        </button>
        <button onclick="cerrarSesion()" class="text-xs text-red-400 hover:text-red-300 font-bold border border-red-500/30 px-3 py-1.5 rounded-lg hover:bg-red-500/10 transition-all">
          Cerrar Sesión
        </button>
      </div>
    </div>
  </header>

  <!-- SECCIÓN DE PRODUCTOS -->
  <main class="max-w-7xl mx-auto px-4 py-12">
    <div class="text-center mb-10">
      <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-white mb-2">PRODUCTOS DISPONIBLES</h1>
      <p class="text-nexusPurple font-medium text-sm tracking-wide uppercase">Equipamiento de alto rendimiento optimizado</p>
    </div>

    <!-- Grid del Catálogo -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
      
      <!-- Producto de Ejemplo 1 -->
      <div class="bg-nexusCard border border-nexusCyan/20 hover:border-nexusCyan rounded-xl p-5 flex flex-col justify-between transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_0_20px_rgba(0,240,255,0.15)] group">
        <div>
          <img src="https://images.unsplash.com/photo-1591488320449-011701bb6704?q=80&w=400&auto=format&fit=crop" alt="GPU" class="w-full h-40 object-cover rounded-lg mb-4">
          <span class="text-[10px] text-nexusCyan uppercase font-bold tracking-widest">Gráficas</span>
          <h3 class="font-bold text-white text-lg mt-1">RTX 4070 SUPER Ti</h3>
          <p class="text-xs text-gray-400 mt-2 leading-relaxed">Máximo rendimiento en trazado de rayos y renderizado 4K.</p>
          <p class="text-nexusCyan font-black text-xl mt-4">$849.00</p>
        </div>
        <div class="mt-6 space-y-2">
          <button onclick="agregarAlCarrito('RTX 4070 SUPER Ti')" class="w-full text-center text-xs text-nexusPurple font-bold hover:text-white transition-colors py-2.5 border border-nexusPurple/30 rounded-lg hover:bg-nexusPurple/20 cursor-pointer">
            🛒 Añadir al carrito
          </button>
          <button onclick="comprarProducto('RTX 4070 SUPER Ti')" class="w-full text-center text-xs text-black bg-nexusCyan hover:bg-white font-extrabold py-2.5 rounded-lg transition-colors cursor-pointer">
            ⚡ Comprar ahora
          </button>
        </div>
      </div>

      <!-- Producto de Ejemplo 2 -->
      <div class="bg-nexusCard border border-nexusPurple/20 hover:border-nexusPurple rounded-xl p-5 flex flex-col justify-between transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_0_20px_rgba(188,19,254,0.15)] group">
        <div>
          <img src="https://images.unsplash.com/photo-1591488320449-011701bb6704?q=80&w=400&auto=format&fit=crop" alt="CPU" class="w-full h-40 object-cover rounded-lg mb-4">
          <span class="text-[10px] text-nexusPurple uppercase font-bold tracking-widest">Procesadores</span>
          <h3 class="font-bold text-white text-lg mt-1">AMD Ryzen 7 7800X3D</h3>
          <p class="text-xs text-gray-400 mt-2 leading-relaxed">El procesador definitivo para gaming competitivo.</p>
          <p class="text-nexusPurple font-black text-xl mt-4">$449.00</p>
        </div>
        <div class="mt-6 space-y-2">
          <button onclick="agregarAlCarrito('AMD Ryzen 7 7800X3D')" class="w-full text-center text-xs text-nexusCyan font-bold hover:text-white transition-colors py-2.5 border border-nexusCyan/30 rounded-lg hover:bg-nexusCyan/20 cursor-pointer">
            🛒 Añadir al carrito
          </button>
          <button onclick="comprarProducto('AMD Ryzen 7 7800X3D')" class="w-full text-center text-xs text-white bg-nexusPurple hover:bg-purple-500 font-extrabold py-2.5 rounded-lg transition-colors cursor-pointer">
            ⚡ Comprar ahora
          </button>
        </div>
      </div>

    </div>
  </main>

  <script>
    // Recuperar datos de sesión del usuario
    const userName = localStorage.getItem('usuario_nombre');
    if (!userName) {
        // Redirigir al login si intenta entrar sin estar logueado
        window.location.href = '/';
    } else {
        document.getElementById('userGreeting').textContent = `Piloto: ${userName}`;
    }

    let itemsEnCarrito = 0;

    function agregarAlCarrito(producto) {
        itemsEnCarrito++;
        document.getElementById('cartCount').textContent = itemsEnCarrito;
        alert(`¡${producto} se añadió al carrito con éxito!`);
    }

    function comprarProducto(producto) {
        alert(`Iniciando pasarela de pago segura para: ${producto}`);
    }

    function cerrarSesion() {
        localStorage.clear();
        window.location.href = '/';
    }
  </script>
</body>
</html>
