<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Gaming - Red de Sedes</title>
    
    <!-- Leaflet API (Mapas) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
    :root {
        --nexus-dark: #0b0c10;
        --nexus-card: #1f2833;
        --nexus-purple: #8a2be2;
        --nexus-cyan: #00f0ff;
        --nexus-text: #c5c6c7;
        --nexus-white: #ffffff;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, sans-serif; }
    body { background: var(--nexus-dark); min-height:100vh; padding:20px; color: var(--nexus-text); }
    
    .dashboard-container {
        display: grid;
        grid-template-columns: 400px 1fr;
        gap: 20px;
        height: calc(100vh - 40px);
        max-width: 1400px;
        margin: 0 auto;
    }

    .card { background: var(--nexus-card); border-radius:18px; overflow:hidden; box-shadow:0 0 20px rgba(0,0,0,.5); border: 1px solid #45a29e; display: flex; flex-direction: column; }
    
    .header { background: linear-gradient(90deg, var(--nexus-purple), var(--nexus-cyan)); color: white; padding:25px; }
    .header h1 { font-size:24px; margin-bottom:5px; }
    .header p { opacity: 0.9; font-size: 14px; }
    
    .info-seccion { padding: 25px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
    
    .conexiones-lista { display: flex; flex-direction: column; gap: 10px; }
    .conexion-item { background: #0b0c10; padding: 12px 15px; border-left: 4px solid var(--nexus-purple); border-radius: 6px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
    .conexion-item span { font-weight: 600; color: var(--nexus-white); }
    .conexion-item .distancia { background: rgba(0, 240, 255, 0.1); color: var(--nexus-cyan); border: 1px solid var(--nexus-cyan); padding: 3px 8px; border-radius: 12px; font-size: 12px; }

    .btn-volver { 
        display: block; text-align: center; background: transparent; color: var(--nexus-white); border: 2px solid var(--nexus-purple); 
        padding: 15px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; transition: .3s; margin-top: auto;
    }
    .btn-volver:hover { background: var(--nexus-purple); box-shadow: 0 0 15px var(--nexus-purple); }

    #mapa-red {
        width: 100%; height: 100%; border-radius: 18px; border: 1px solid var(--nexus-purple);
        box-shadow: 0 0 20px rgba(138, 43, 226, 0.2); z-index: 1;
    }
    
    .no-tramos { color: var(--nexus-text); font-style: italic; text-align: center; padding: 20px 0; }

    /* Estilos para adaptarse a dispositivos móviles */
    @media (max-width: 900px) {
        .dashboard-container {
            grid-template-columns: 1fr;
            height: auto;
        }
        #mapa-red {
            min-height: 500px;
        }
        .card {
            max-height: 400px;
        }
    }

    /* Estilos para los marcadores nativos sin imágenes */
    .nodo-mapa {
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 0 10px currentColor;
    }
</style>
</head>
<body>

<div class="dashboard-container">
    
    <div class="card">
        <div class="header">
            <h1>Red Conectada</h1>
            <p>Visualización del tendido de rutas en el mapa.</p>
        </div>

        <div class="info-seccion">
            <h3 style="color:#1e293b; font-size: 16px;">Conexiones Activas</h3>
            
            <div class="conexiones-lista">
                <div th:if="${#lists.isEmpty(listaTramos)}" class="no-tramos">
                    No se han registrado tramos para conectar en el mapa.
                </div>
                
                <div class="conexion-item" th:each="tramo : ${listaTramos}">
                    <div>
                        <span th:text="${tramo.sedeOrigen.nombreCiudad}"></span> 
                        <span style="color: #6b7280; font-weight: normal;">➔</span> 
                        <span th:text="${tramo.sedeDestino.nombreCiudad}"></span>
                    </div>
                    <div class="distancia" th:text="${tramo.distanciaKm} + ' Km'"></div>
                </div>
            </div>

            <a href="/tramos" class="btn-volver">Volver a Gestión</a>
        </div>
    </div>

    <div id="mapa-red"></div>
</div>

<script th:inline="javascript">
/*<![CDATA[*/

    const mapa = L.map('mapa-red').setView([-1.8312, -78.1834], 7);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(mapa);

    const sedes = [];
    /*[# th:each="s : ${listaSedes}"]*/
    sedes.push({
        id: /*[[${s.idSede}]]*/ 0,
        nombre: /*[[${s.nombreCiudad}]]*/ '',
        lat: /*[[${s.latitud}]]*/ 0,
        lng: /*[[${s.longitud}]]*/ 0
    });
    /*[/]*/

    const tramos = [];
    /*[# th:each="t : ${listaTramos}"]*/
    tramos.push({
        id: /*[[${t.idTramo}]]*/ 0,
        origenNombre: /*[[${t.sedeOrigen.nombreCiudad}]]*/ '',
        origenLat: /*[[${t.sedeOrigen.latitud}]]*/ 0,
        origenLng: /*[[${t.sedeOrigen.longitud}]]*/ 0,
        destinoNombre: /*[[${t.sedeDestino.nombreCiudad}]]*/ '',
        destinoLat: /*[[${t.sedeDestino.latitud}]]*/ 0,
        destinoLng: /*[[${t.sedeDestino.longitud}]]*/ 0,
        distancia: /*[[${t.distanciaKm}]]*/ 0
    });
    /*[/]*/

    // Función para crear nodos visuales nativos HTML/CSS
    function crearNodo(color) {
        return L.divIcon({
            className: 'custom-nodo',
            html: `<div class="nodo-mapa" style="background-color: ${color}; width: 14px; height: 14px; color: ${color};"></div>`,
            iconSize: [14, 14],
            iconAnchor: [7, 7],
            popupAnchor: [0, -10]
        });
    }

    // Instanciar el color morado de la temática para las sedes
    const nodoSede = crearNodo('#8a2be2');

    const limitesMapa = [];
    sedes.forEach(sede => {
        // Se utiliza el marcador nativo optimizado
        const marker = L.marker([sede.lat, sede.lng], { 
            icon: nodoSede,
            draggable: false 
        })
            .addTo(mapa)
            .bindPopup(`<b>Sede:</b> ${sede.nombre}`);
        
        limitesMapa.push([sede.lat, sede.lng]);
    });

    if (limitesMapa.length > 0) {
        mapa.fitBounds(limitesMapa, { padding: [50, 50] });
    }

    tramos.forEach(tramo => {
        const urlOSRM = `https://router.project-osrm.org/route/v1/driving/${tramo.origenLng},${tramo.origenLat};${tramo.destinoLng},${tramo.destinoLat}?overview=full&geometries=geojson`;

        fetch(urlOSRM)
            .then(response => {
                if (!response.ok) throw new Error("Error consultando OSRM");
                return response.json();
            })
            .then(data => {
                if (data.routes && data.routes.length > 0) {
                    const coordenadasRuta = data.routes[0].geometry.coordinates.map(coord => [coord[1], coord[0]]);
                    
                    L.polyline(coordenadasRuta, { 
                        color: '#00f0ff', // Se cambió a Cyan para que contraste con los nodos morados
                        weight: 4, 
                        opacity: 0.8 
                    })
                    .addTo(mapa)
                    .bindPopup(`<b>Ruta Conectada:</b> ${tramo.origenNombre} ➔ ${tramo.destinoNombre}<br><b>Distancia:</b> ${tramo.distancia} Km`);
                } else {
                    trazarLineaRectaRespaldo(tramo);
                }
            })
            .catch(error => { 
                trazarLineaRectaRespaldo(tramo); 
            });
    });

    function trazarLineaRectaRespaldo(tramo) {
        const coords = [
            [tramo.origenLat, tramo.origenLng], 
            [tramo.destinoLat, tramo.destinoLng]
        ];
        L.polyline(coords, { 
            color: '#ef4444', 
            weight: 3, 
            dashArray: '6, 12', 
            opacity: 0.7 
        })
        .addTo(mapa)
        .bindPopup(`<b>Conexión Directa:</b> ${tramo.origenNombre} ➔ ${tramo.destinoNombre}<br><b>Distancia:</b> ${tramo.distancia} Km`);
    }

/*]]>*/
</script>
</body>
</html>
