<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nexus Gaming - Red de Sedes</title>
    
    <!-- Leaflet API (Mapas) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, sans-serif; }
        body { background:#f4f6f9; min-height:100vh; padding:20px; }
        
        .dashboard-container {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
            max-width: 1400px;
            margin: 0 auto;
        }

        .card { background:white; border-radius:18px; overflow:hidden; box-shadow:0 15px 40px rgba(0,0,0,.08); display: flex; flex-direction: column; }
        .header { background:#2563eb; color:white; padding:25px; }
        .header h1 { font-size:24px; margin-bottom:5px; }
        .header p { opacity: 0.9; font-size: 14px; }
        
        .info-seccion { padding: 25px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* Lista de Conexiones */
        .conexiones-lista { display: flex; flex-direction: column; gap: 10px; }
        .conexion-item { background: #eff6ff; padding: 12px 15px; border-left: 4px solid #2563eb; border-radius: 6px; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .conexion-item span { font-weight: 600; color: #1e293b; }
        .conexion-item .distancia { background: #dbeafe; color: #1e40af; padding: 3px 8px; border-radius: 12px; font-size: 12px; }

        .btn-volver { 
            display: block; 
            text-align: center; 
            background: #475569; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            text-decoration: none;
            transition: .3s; 
            margin-top: auto;
        }
        .btn-volver:hover { background: #334155; transform: translateY(-2px); }

        #mapa-red {
            width: 100%;
            height: 100%;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,.08);
            border: 2px solid #e5e7eb;
            z-index: 1;
        }
        
        .no-tramos { color: #6b7280; font-style: italic; text-align: center; padding: 20px 0; }
    </style>
</head>
<body>

<div class="dashboard-container">
    
    <div class="card">
        <div class="header">
            <h1>Red Conectada</h1>
            <p>Visualización del tendido de rutas en el mapa.</p>
        </div>

        <div class="info-seccion">
            <h3 style="color:#1e293b; font-size: 16px;">Conexiones Activas</h3>
            
            <div class="conexiones-lista">
                <!-- Mensaje si no hay tramos -->
                <div th:if="${#lists.isEmpty(listaTramos)}" class="no-tramos">
                    No se han registrado tramos para conectar en el mapa.
                </div>
                
                <!-- Iterar los tramos activos en la barra lateral -->
                <div class="conexion-item" th:each="tramo : ${listaTramos}">
                    <div>
                        <span th:text="${tramo.sedeOrigen.nombreCiudad}"></span> 
                        <span style="color: #6b7280; font-weight: normal;">➔</span> 
                        <span th:text="${tramo.sedeDestino.nombreCiudad}"></span>
                    </div>
                    <div class="distancia" th:text="${tramo.distanciaKm} + ' Km'"></div>
                </div>
            </div>

            <!-- Botón para regresar a la gestión principal -->
            <a href="/tramos" class="btn-volver">⬅️ Volver a Gestión</a>
        </div>
    </div>

    <!-- Contenedor del Mapa interactivo Leaflet -->
    <div id="mapa-red"></div>
</div>

<script th:inline="javascript">
/*<![CDATA[*/

    // 1. Inicializar Mapa apuntando por defecto al centro geográfico de Ecuador
    const mapa = L.map('mapa-red').setView([-1.8312, -78.1834], 7);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(mapa);

    // 2. Extraer Sedes desde Thymeleaf de forma segura
    const sedes = [];
    /*[# th:each="s : ${listaSedes}"]*/
    sedes.push({
        id: /*[[${s.idSede}]]*/ 0,
        nombre: /*[[${s.nombreCiudad}]]*/ '',
        lat: /*[[${s.latitud}]]*/ 0,
        lng: /*[[${s.longitud}]]*/ 0
    });
    /*[/]*/

    // 3. Extraer Tramos desde Thymeleaf de forma segura
    const tramos = [];
    /*[# th:each="t : ${listaTramos}"]*/
    tramos.push({
        id: /*[[${t.idTramo}]]*/ 0,
        origenNombre: /*[[${t.sedeOrigen.nombreCiudad}]]*/ '',
        origenLat: /*[[${t.sedeOrigen.latitud}]]*/ 0,
        origenLng: /*[[${t.sedeOrigen.longitud}]]*/ 0,
        destinoNombre: /*[[${t.sedeDestino.nombreCiudad}]]*/ '',
        destinoLat: /*[[${t.sedeDestino.latitud}]]*/ 0,
        destinoLng: /*[[${t.sedeDestino.longitud}]]*/ 0,
        distancia: /*[[${t.distanciaKm}]]*/ 0
    });
    /*[/]*/

    // 4. Dibujar Sedes como Marcadores Fijos (no arrastrables)
    const limitesMapa = [];
    sedes.forEach(sede => {
        const marker = L.marker([sede.lat, sede.lng], { draggable: false })
            .addTo(mapa)
            .bindPopup(`<b>Sede:</b> ${sede.nombre}`);
        
        limitesMapa.push([sede.lat, sede.lng]);
    });

    // Ajustar zoom automático para que quepan todas las ciudades registradas
    if (limitesMapa.length > 0) {
        mapa.fitBounds(limitesMapa, { padding: [50, 50] });
    }

    // 5. Dibujar cada uno de los tramos independientes vía OSRM
    tramos.forEach(tramo => {
        const urlOSRM = `https://router.project-osrm.org/route/v1/driving/${tramo.origenLng},${tramo.origenLat};${tramo.destinoLng},${tramo.destinoLat}?overview=full&geometries=geojson`;

        fetch(urlOSRM)
            .then(response => {
                if (!response.ok) throw new Error("Error consultando OSRM");
                return response.json();
            })
            .then(data => {
                if (data.routes && data.routes.length > 0) {
                    const coordenadasRuta = data.routes[0].geometry.coordinates.map(coord => [coord[1], coord[0]]);
                    
                    // Crear línea sólida azul para la carretera
                    L.polyline(coordenadasRuta, { 
                        color: '#2563eb', 
                        weight: 4, 
                        opacity: 0.8 
                    })
                    .addTo(mapa)
                    .bindPopup(`<b>Ruta Conectada:</b> ${tramo.origenNombre} ➔ ${tramo.destinoNombre}<br><b>Distancia:</b> ${tramo.distancia} Km`);
                } else {
                    trazarLineaRectaRespaldo(tramo);
                }
            })
            .catch(error => { 
                console.warn(`No se pudo trazar la ruta real para el tramo ID: ${tramo.id}. Usando línea recta.`);
                trazarLineaRectaRespaldo(tramo); 
            });
    });

    // Función de respaldo en caso de que OSRM falle o no detecte ruta terrestre
    function trazarLineaRectaRespaldo(tramo) {
        const coords = [
            [tramo.origenLat, tramo.origenLng], 
            [tramo.destinoLat, tramo.destinoLng]
        ];
        L.polyline(coords, { 
            color: '#ef4444', 
            weight: 3, 
            dashArray: '6, 12', 
            opacity: 0.7 
        })
        .addTo(mapa)
        .bindPopup(`<b>Conexión Directa:</b> ${tramo.origenNombre} ➔ ${tramo.destinoNombre}<br><b>Distancia:</b> ${tramo.distancia} Km`);
    }

/*]]>*/
</script>
</body>
</html>
