<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nexus Gaming - Gestión de Sedes</title>

    <style>
    :root {
        --nexus-dark: #0b0c10;
        --nexus-card: #1f2833;
        --nexus-purple: #8a2be2;
        --nexus-cyan: #00f0ff;
        --nexus-text: #c5c6c7;
        --nexus-white: #ffffff;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, sans-serif; }
    body { background: var(--nexus-dark); min-height:100vh; display:flex; justify-content:center; align-items:center; padding:40px; color: var(--nexus-text); }
    
    .container { width:100%; max-width:1300px; display:flex; flex-direction:column; gap:20px; }
    
    .grid-layout { display: grid; grid-template-columns: 1fr 1.2fr; gap: 30px; align-items: start; }
    
    .card { width:100%; background: var(--nexus-card); border-radius:18px; overflow:hidden; box-shadow:0 0 20px rgba(0,0,0,.5); border: 1px solid #45a29e; }
    
    .header { background: linear-gradient(90deg, var(--nexus-purple), var(--nexus-cyan)); color: white; padding:25px 30px; }
    .header h1 { font-size:24px; margin-bottom:6px; }
    .header p { opacity: 0.9; font-size: 14px; }
    
    form { padding:30px; display:flex; flex-direction:column; }
    label { margin-bottom:8px; color: var(--nexus-white); font-weight:600; font-size: 14px; }
    input { padding:12px; background: #0b0c10; color: white; border:1px solid #45a29e; border-radius:10px; margin-bottom:20px; font-size:15px; outline:none; }
    input:focus { border-color: var(--nexus-cyan); box-shadow:0 0 10px rgba(0,240,255,0.4); }
    input[readonly] { background: #161920; color: var(--nexus-cyan); font-weight: bold; cursor: not-allowed; }
    
    button[type="submit"] { background: transparent; color: var(--nexus-white); border: 2px solid var(--nexus-purple); padding:14px; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; transition:.3s; }
    button[type="submit"]:hover { background: var(--nexus-purple); box-shadow: 0 0 15px var(--nexus-purple); }
    
    #mapa { width:100%; height:300px; border-radius:12px; overflow:hidden; border:1px solid var(--nexus-cyan); margin-bottom: 15px; }
    
    /* Tabla */
    .tabla-seccion { padding: 30px; background: var(--nexus-card); }
    .tabla-seccion h2 { color: var(--nexus-white); margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #0b0c10; color: var(--nexus-cyan); padding: 14px; font-size: 13px; border-bottom: 2px solid var(--nexus-purple); text-transform: uppercase; }
    td { padding: 14px; border-bottom: 1px solid #45a29e; color: var(--nexus-text); }
    
    .badge-coord { background: rgba(0, 240, 255, 0.1); color: var(--nexus-cyan); border: 1px solid var(--nexus-cyan); padding: 4px 8px; border-radius: 6px; font-family: monospace; font-size: 12px; }

    /* Botones Acción */
    .btn-accion { padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; border: none; cursor: pointer; }
    .btn-editar { background: #331a4d; color: var(--nexus-purple); border: 1px solid var(--nexus-purple); }
    .btn-eliminar { background: #4d1a1a; color: #ff5555; border: 1px solid #ff5555; }

    /* Modal */
    .modal-card { background: var(--nexus-card); border-radius: 18px; border: 1px solid var(--nexus-purple); }
    .modal-header { background: var(--nexus-purple); color: white; padding: 20px 25px; }
    .btn-modal-guardar { background: var(--nexus-cyan); color: #000; border: none; }
    .btn-modal-cancelar { background: #333; color: white; }

    /* Alertas */
    .alerta-error { background: #2a0000; color: #ff5555; border: 1px solid #ff5555; }
    .alerta-exito { background: #002a2a; color: var(--nexus-cyan); border: 1px solid var(--nexus-cyan); }
</style>
</head>
<body>

<!-- Alertas Toasts Flotantes -->
<div class="toast-container">
    <div th:if="${mensajeError}" class="alerta alerta-error">
        <span th:text="'⚠️ ' + ${mensajeError}"></span>
    </div>
    <div th:if="${mensajeExito}" class="alerta alerta-exito">
        <span th:text="'✅ ' + ${mensajeExito}"></span>
    </div>
</div>

<div class="container">
    <div class="grid-layout">
        
        <!-- Formulario de Registro (Izquierda) -->
        <div class="card">
            <div class="header">
                <h1>Registrar Sede</h1>
                <p>Selecciona la ubicación en el mapa e ingresa la información.</p>
            </div>

            <form th:action="@{/sedes/guardar}" th:object="${nuevaSede}" method="post">
                <label>Ciudad</label>
                <input type="text" th:field="*{nombreCiudad}" placeholder="Ej. Quito" required>

                <label>Latitud</label>
                <input type="number" step="any" th:field="*{latitud}" id="latitud" readonly required>

                <label>Longitud</label>
                <input type="number" step="any" th:field="*{longitud}" id="longitud" readonly required>

                <div id="mapa"></div>

                <p style="color:#6b7280; font-size:13px; line-height:1.5; font-style: italic; margin-bottom: 15px;">
                    Arrastra el marcador rojo para cambiar las coordenadas geográficas de la sede.
                </p>

                <button type="submit">Guardar Sede en el Sistema</button>
            </form>
        </div>

        <!-- Historial en Tabla (Derecha) -->
        <div class="card">
            <div class="tabla-seccion">
                <h2>Sedes Registradas</h2>
                <div class="tabla-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Ciudad</th>
                                <th>Coordenadas</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(listaSedes)}">
                                <td colspan="4" style="text-align: center; color: #9ca3af; font-style: italic; padding: 30px 0;">
                                    No hay sedes registradas en el sistema actualmente.
                                </td>
                            </tr>
                            <tr th:each="sede : ${listaSedes}">
                                <td th:text="${sede.idSede}" style="font-weight: 600; color: #6b7280;"></td>
                                <td th:text="${sede.nombreCiudad}" style="font-weight: 600;"></td>
                                <td>
                                    <div style="display: flex; flex-direction: column; gap: 4px;">
                                        <span class="badge-coord" th:text="'Lat: ' + ${sede.latitud}"></span>
                                        <span class="badge-coord" th:text="'Lng: ' + ${sede.longitud}"></span>
                                    </div>
                                </td>
                                <td>
                                    <button type="button" class="btn-accion btn-editar" th:onclick="'abrirModalEditarSede(' + ${sede.idSede} + ')'">
                                        Editar
                                    </button>
                                    <a th:href="@{/sedes/eliminar/{id}(id=${sede.idSede})}" 
                                       class="btn-accion btn-eliminar"
                                       onclick="return confirm('¿Estás seguro de que deseas eliminar esta sede?');">
                                        Eliminar
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ==================== CONTENEDOR DEL MODAL "EL CUADRADO" ==================== -->
<div id="modalEditar" class="modal-overlay">
    <div class="modal-card">
        <div class="modal-header">
            <h2>Editar Sede</h2>
            <button type="button" class="btn-close" onclick="cerrarModal()">&times;</button>
        </div>
        <div class="modal-body" id="modalBodyContainer">
            <!-- Se inyectará el fragmento editar_sede.html aquí... -->
        </div>
    </div>
</div>

<script>
    // --- LÓGICA DE GOOGLE MAPS (CREACIÓN) ---
    let map;
    let marcador;
    const coordenada_central = {
        lat: -0.9178982734136378,
        lng: -78.6329809324952
    };

    function initMap() {
        map = new google.maps.Map(document.getElementById("mapa"), {
            zoom: 12,
            center: coordenada_central,
            styles: [
                { featureType: "poi", stylers: [{ visibility: "off" }] },
                { featureType: "transit", stylers: [{ visibility: "off" }] }
            ]
        });

        marcador = new google.maps.Marker({
            position: coordenada_central,
            map: map,
            draggable: true,
            animation: google.maps.Animation.DROP
        });

        document.getElementById("latitud").value = coordenada_central.lat;
        document.getElementById("longitud").value = coordenada_central.lng;

        marcador.addListener("dragend", function(event) {
            document.getElementById("latitud").value = event.latLng.lat();
            document.getElementById("longitud").value = event.latLng.lng();
        });
    }

    // --- LÓGICA GOOGLE MAPS (EDICIÓN EN MODAL) ---
    function initMapEditar(lat, lng) {
        const coordenada_edicion = { lat: parseFloat(lat), lng: parseFloat(lng) };
        const mapaEdit = new google.maps.Map(document.getElementById("mapa-edit"), {
            zoom: 13,
            center: coordenada_edicion,
            styles: [
                { featureType: "poi", stylers: [{ visibility: "off" }] },
                { featureType: "transit", stylers: [{ visibility: "off" }] }
            ]
        });

        const marcadorEdit = new google.maps.Marker({
            position: coordenada_edicion,
            map: mapaEdit,
            draggable: true,
            animation: google.maps.Animation.DROP
        });

        marcadorEdit.addListener("dragend", function(event) {
            document.getElementById("editLatitud").value = event.latLng.lat();
            document.getElementById("editLongitud").value = event.latLng.lng();
        });
    }

    // --- MANEJO DEL MODAL DINÁMICO POR THYMELEAF FRAGMENT ---
    function abrirModalEditarSede(id) {
        const modal = document.getElementById('modalEditar');
        const modalBody = document.getElementById('modalBodyContainer');

        modalBody.innerHTML = "<p style='text-align: center; color: #6b7280;'>Cargando mapa e información de la sede...</p>";
        modal.classList.add('active');

        // Consumir el Fragmento del controlador
        fetch(`/sedes/editar/${id}`)
            .then(response => {
                if(!response.ok) throw new Error("No se pudo obtener la plantilla de edición");
                return response.text();
            })
            .then(htmlFragment => {
                modalBody.innerHTML = htmlFragment;

                // Extraemos latitud y longitud cargados en el formulario para iniciar el mapa del modal
                const editLat = document.getElementById("editLatitud").value;
                const editLng = document.getElementById("editLongitud").value;

                // Inicializamos el mapa en el modal con sus respectivas coordenadas
                initMapEditar(editLat, editLng);
            })
            .catch(error => {
                modalBody.innerHTML = "<p style='color:red; text-align:center;'>Error al cargar el fragmento de la sede.</p>";
                console.error(error);
            });
    }

    function cerrarModal() {
        document.getElementById('modalEditar').classList.remove('active');
    }

    window.onclick = function(event) {
        const modal = document.getElementById('modalEditar');
        if (event.target === modal) {
            cerrarModal();
        }
    }
</script>

<script async defer
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAT191SwT7Bc1S6vAsbmmF_km9SFEzwT64&libraries=places&callback=initMap">
</script>

</body>
</html>
