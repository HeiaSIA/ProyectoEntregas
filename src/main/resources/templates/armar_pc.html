<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nexus Game - Armar tu PC</title>
    <!-- Bootstrap CSS para estructura rápida -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Fondo base oscuro cyberpunk */
        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Título con resplandor neón */
        .neon-title {
            color: #fff;
            text-shadow: 0 0 10px #8a2be2, 0 0 20px #00f0ff, 0 0 30px #8a2be2;
        }

        /* Tarjetas de componentes oscuras y reactivas */
        .card-componente {
            background-color: #1f2833;
            border: 2px solid #45a29e;
            transition: all 0.3s ease-in-out;
            cursor: pointer;
        }
        .card-componente:hover {
            transform: translateY(-5px);
            border-color: #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }
        .card-title {
            color: #fff;
        }

        /* Texto de precios neón */
        .text-neon-cyan {
            color: #00f0ff;
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.5);
        }
        .text-neon-purple {
            color: #bf55ec;
            text-shadow: 0 0 5px rgba(191, 85, 236, 0.5);
        }

        /* Estilos de las Pestañas (Tabs) */
        .nav-tabs {
            border-bottom: 2px solid #8a2be2;
        }
        .nav-tabs .nav-link {
            color: #45a29e;
            border: none;
            background: none;
            font-weight: bold;
            transition: all 0.3s;
        }
        .nav-tabs .nav-link:hover {
            color: #00f0ff;
            border: none;
        }
        .nav-tabs .nav-link.active {
            color: #00f0ff !important;
            background-color: transparent !important;
            border: none;
            border-bottom: 3px solid #00f0ff;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
        }

        /* Botón estilo Cyberpunk */
        .btn-neon-purple {
            color: #fff;
            border: 2px solid #8a2be2;
            background-color: transparent;
            transition: all 0.3s;
            font-weight: 600;
        }
        .btn-neon-purple:hover {
            background-color: #8a2be2;
            color: #fff;
            box-shadow: 0 0 15px #8a2be2;
        }

        /* Botón de compra final */
        .btn-neon-cyan {
            color: #0b0c10;
            background-color: #00f0ff;
            border: none;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        .btn-neon-cyan:hover {
            background-color: #fff;
            color: #0b0c10;
            box-shadow: 0 0 20px #00f0ff;
        }

        /* Barra lateral fija del Presupuesto */
        .sidebar-presupuesto {
            position: sticky;
            top: 20px;
            background-color: #1a1a24;
            border: 2px solid #8a2be2;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.2);
        }
        
        /* Divisores estéticos */
        .border-neon-purple {
            border-color: #8a2be2 !important;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <h1 class="text-center mb-5 fw-bold neon-title">🔧 CONFIGURA TU PC GAMER</h1>
    
    <div class="row">
        <!-- SECCIÓN DE COMPONENTES (IZQUIERDA) -->
        <div class="col-md-8">
            <!-- Menú de Pestañas Nav -->
            <ul class="nav nav-tabs mb-4" id="pcTabs" role="tablist">
                <li class="nav-item"><button class="nav-link active" id="cpu-tab" data-bs-toggle="tab" data-bs-target="#cpu" type="button">CPUs</button></li>
                <li class="nav-item"><button class="nav-link" id="gpu-tab" data-bs-toggle="tab" data-bs-target="#gpu" type="button">GPUs</button></li>
                <li class="nav-item"><button class="nav-link" id="ram-tab" data-bs-toggle="tab" data-bs-target="#ram" type="button">RAM</button></li>
                <li class="nav-item"><button class="nav-link" id="storage-tab" data-bs-toggle="tab" data-bs-target="#storage" type="button">Discos</button></li>
                <li class="nav-item"><button class="nav-link" id="chasis-tab" data-bs-toggle="tab" data-bs-target="#chasis" type="button">Chasis</button></li>
                <li class="nav-item"><button class="nav-link" id="perifericos-tab" data-bs-toggle="tab" data-bs-target="#perifericos" type="button">Otros</button></li>
            </ul>

            <!-- Contenido de cada Pestaña -->
            <div class="tab-content" id="pcTabsContent">
                
                <!-- Pestaña Procesadores -->
                <div class="tab-pane fade show active" id="cpu" role="tabpanel">
                    <div class="row row-cols-1 row-cols-md-3 g-3">
                        <div class="col" th:each="prod : ${procesadores}">
                            <div class="card h-100 card-componente shadow-sm">
                                <img th:src="@{'/imagenes/' + ${prod.imagen}}" class="card-img-top p-3" alt="CPU" style="height: 160px; object-fit: contain;">
                                <div class="card-body d-flex flex-column justify-content-between">
                                    <h6 class="card-title fw-bold" th:text="${prod.nombre}">Procesador</h6>
                                    <div>
                                        <p class="text-neon-cyan fw-bold mb-2" th:text="'$' + ${prod.precio}">$0.00</p>
                                        <button class="btn btn-neon-purple btn-sm w-100 btn-agregar" 
                                                data-categoria="Procesador"
                                                th:data-nombre="${prod.nombre}" 
                                                th:data-precio="${prod.precioBase}">
                                            Agregar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pestaña Tarjetas Gráficas -->
                <div class="tab-pane fade" id="gpu" role="tabpanel">
                    <div class="row row-cols-1 row-cols-md-3 g-3">
                        <div class="col" th:each="prod : ${tarjetasVideo}">
                            <div class="card h-100 card-componente shadow-sm">
                                <img th:src="@{'/imagenes/' + ${prod.imagen}}" class="card-img-top p-3" alt="GPU" style="height: 160px; object-fit: contain;">
                                <div class="card-body d-flex flex-column justify-content-between">
                                    <h6 class="card-title fw-bold" th:text="${prod.nombre}">Tarjeta de Video</h6>
                                    <div>
                                        <p class="text-neon-cyan fw-bold mb-2" th:text="'$' + ${prod.precio}">$0.00</p>
                                        <button class="btn btn-neon-purple btn-sm w-100 btn-agregar" 
                                                data-categoria="Tarjeta Gráfica"
                                                th:data-nombre="${prod.nombre}" 
                                                th:data-precio="${prod.precioBase}">
                                            Agregar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pestaña Memorias RAM -->
                <div class="tab-pane fade" id="ram" role="tabpanel">
                    <div class="row row-cols-1 row-cols-md-3 g-3">
                        <div class="col" th:each="prod : ${memoriasRam}">
                            <div class="card h-100 card-componente shadow-sm">
                                <img th:src="@{'/imagenes/' + ${prod.imagen}}" class="card-img-top p-3" alt="RAM" style="height: 160px; object-fit: contain;">
                                <div class="card-body d-flex flex-column justify-content-between">
                                    <h6 class="card-title fw-bold" th:text="${prod.nombre}">Memoria RAM</h6>
                                    <div>
                                        <p class="text-neon-cyan fw-bold mb-2" th:text="'$' + ${prod.precioBase}">$0.00</p>
                                        <button class="btn btn-neon-purple btn-sm w-100 btn-agregar" 
                                                data-categoria="Memoria RAM"
                                                th:data-nombre="${prod.nombre}" 
                                                th:data-precio="${prod.precioBase}">
                                            Agregar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pestaña Almacenamiento -->
                <div class="tab-pane fade" id="storage" role="tabpanel">
                    <div class="row row-cols-1 row-cols-md-3 g-3">
                        <div class="col" th:each="prod : ${almacenamientos}">
                            <div class="card h-100 card-componente shadow-sm">
                                <img th:src="@{'/imagenes/' + ${prod.imagen}}" class="card-img-top p-3" alt="Disco" style="height: 160px; object-fit: contain;">
                                <div class="card-body d-flex flex-column justify-content-between">
                                    <h6 class="card-title fw-bold" th:text="${prod.nombre}">Almacenamiento</h6>
                                    <div>
                                        <p class="text-neon-cyan fw-bold mb-2" th:text="'$' + ${prod.precioBase}">$0.00</p>
                                        <button class="btn btn-neon-purple btn-sm w-100 btn-agregar" 
                                                data-categoria="Almacenamiento"
                                                th:data-nombre="${prod.nombre}" 
                                                th:data-precio="${prod.precioBase}">
                                            Agregar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pestaña Chasis -->
                <div class="tab-pane fade" id="chasis" role="tabpanel">
                    <div class="row row-cols-1 row-cols-md-3 g-3">
                        <div class="col" th:each="prod : ${chasis}">
                            <div class="card h-100 card-componente shadow-sm">
                                <img th:src="@{'/imagenes/' + ${prod.imagen}}" class="card-img-top p-3" alt="Chasis" style="height: 160px; object-fit: contain;">
                                <div class="card-body d-flex flex-column justify-content-between">
                                    <h6 class="card-title fw-bold" th:text="${prod.nombre}">Chasis</h6>
                                    <div>
                                        <p class="text-neon-cyan fw-bold mb-2" th:text="'$' + ${prod.precioBase}">$0.00</p>
                                        <button class="btn btn-neon-purple btn-sm w-100 btn-agregar" 
                                                data-categoria="Chasis"
                                                th:data-nombre="${prod.nombre}" 
                                                th:data-precio="${prod.precioBase}">
                                            Agregar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Pestaña Otros -->
                <div class="tab-pane fade" id="perifericos" role="tabpanel">
                    <div class="row row-cols-1 row-cols-md-3 g-3">
                        <div class="col" th:each="prod : ${otros}">
                            <div class="card h-100 card-componente shadow-sm">
                                <img th:src="@{'/imagenes/' + ${prod.imagen}}" class="card-img-top p-3" alt="Otros" style="height: 160px; object-fit: contain;">
                                <div class="card-body d-flex flex-column justify-content-between">
                                    <h6 class="card-title fw-bold" th:text="${prod.nombre}">Accesorio</h6>
                                    <div>
                                        <p class="text-neon-cyan fw-bold mb-2" th:text="'$' + ${prod.precioBase}">$0.00</p>
                                        <button class="btn btn-neon-purple btn-sm w-100 btn-agregar" 
                                                data-categoria="Accesorio/Periférico"
                                                th:data-nombre="${prod.nombre}" 
                                                th:data-precio="${prod.precioBase}">
                                            Agregar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- RESUMEN DEL PRESUPUESTO (DERECHA) -->
        <div class="col-md-4">
            <div class="sidebar-presupuesto">
                <h4 class="fw-bold mb-4 border-bottom border-neon-purple pb-2 text-white">🖥️ Tu Setup</h4>
                
                <div id="componentesSeleccionados" class="mb-4">
                    <p class="text-muted small text-center">Aún no has seleccionado componentes.</p>
                </div>

                <div class="d-flex justify-content-between align-items-center border-top border-neon-purple pt-3 mb-4">
                    <h5 class="fw-bold m-0 text-white">Total:</h5>
                    <h4 class="fw-bold text-neon-cyan m-0" id="precioTotal">$0.00</h4>
                </div>

                <button class="btn btn-neon-cyan w-100 btn-lg" onclick="alert('¡Setup guardado con éxito!')">🛒 Comprar Setup</button>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle para cambiar entre pestañas -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Script dinámico optimizado con data attributes -->
<script>
    let setup = {};

    // Captura dinámica de clics sin importar la renderización
    document.addEventListener("click", function(event) {
        if (event.target && event.target.classList.contains("btn-agregar")) {
            const boton = event.target;
            
            const categoria = boton.getAttribute("data-categoria");
            const nombre = boton.getAttribute("data-nombre");
            const precio = parseFloat(boton.getAttribute("data-precio"));

            setup[categoria] = { nombre: nombre, precio: precio };
            actualizarResumen();
        }
    });

    function actualizarResumen() {
        const contenedor = document.getElementById("componentesSeleccionados");
        const totalTxt = document.getElementById("precioTotal");
        
        contenedor.innerHTML = "";
        let total = 0;

        for (const [cat, item] of Object.entries(setup)) {
            total += item.precio;
            contenedor.innerHTML += `
                <div class="d-flex justify-content-between align-items-start mb-2 border-bottom border-secondary pb-1">
                    <div>
                        <strong class="small text-neon-purple d-block" style="font-size: 0.75rem;">${cat}</strong>
                        <span class="small text-truncate d-inline-block text-white" style="max-width: 180px;">${item.nombre}</span>
                    </div>
                    <span class="badge bg-dark text-neon-cyan border border-info">$${item.precio.toFixed(2)}</span>
                </div>
            `;
        }

        if (Object.keys(setup).length === 0) {
            contenedor.innerHTML = '<p class="text-muted small text-center">Aún no has seleccionado componentes.</p>';
        }

        totalTxt.innerText = `$${total.toFixed(2)}`;
    }
</script>
</body>
</html>
