# === CONFIGURACIÓN DEL SERVIDOR ===
spring.application.name=game
server.port=8080

# === CONFIGURACIÓN DE LA BASE DE DATOS ===
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/BDD_TiendaNexus}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# === CONFIGURACIÓN DE JPA / HIBERNATE ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- SOLUCIÓN PARA RENDER / POSTGRESQL ---
# Especificamos el dialecto exacto para evitar el error "Unable to determine Dialect"
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# === VARIABLES DE SEGURIDAD EXTRAS ===
google.maps.api.key=${GOOGLE_MAPS_API_KEY:clave_local_temporal}
admin.panel.password=${ADMIN_PASSWORD:1234}
